    // 2. Giriş funksiyaları
function initialLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const group = document.getElementById('group-code').value.trim().toLowerCase(); // Qrupu kiçik hərflərlə alırıq

    if (!user || !group) { 
        alert("İstifadəçi adı və Qrup kodunu daxil edin!"); 
        return; 
    }

    // Qrup kodunu istifadəçinin adına bağlayırıq
    localStorage.setItem('group_' + user, group);
    
    if (!user) { alert("İstifadəçi adını daxil edin!"); return; }
    
    // Əgər istifadəçi artıq öz parolunu təyin edibsə, onu yoxlayırıq
    const savedPass = localStorage.getItem('pass_' + user);
    
    if (savedPass) {
        // Əgər artıq parol qoyulubsa, birbaşa onu istəyirik
        if (pass === savedPass) {
            currentUser = user;
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            fetchMatches();
        } else {
            alert("Yanlış parol!");
        }
    } else {
        // İlkin giriş: 1234-lə daxil olub parol dəyişməyə məcbur edirik
        if (pass === "1234") { 
            currentUser = user; 
            document.getElementById('login-form').style.display = 'none'; 
            document.getElementById('reset-form').style.display = 'block'; 
        } else { 
            alert("Yanlış parol!"); 
        }
    }
}

function updatePassword() {
    const newPass = document.getElementById('new-password').value;
    const confirmPass = document.getElementById('confirm-password').value;
    
    if (newPass.length < 4) {
        alert("Parol ən az 4 simvol olmalıdır!");
        return;
    }
    
    if (newPass !== confirmPass) {
        alert("Parollar uyğun gəlmir!");
        return;
    }
    
    // Parolu yadda saxlayırıq
    localStorage.setItem('pass_' + currentUser, newPass);
    
    // Sistemi işə salırıq
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('main-system').style.display = 'block';
    fetchMatches();
}

    function checkGoals(matches) {
        matches.forEach(m => {
            if (['IN_PLAY', 'PAUSED', 'HALFTIME'].includes(m.status)) {
                const currentScore = `${m.score?.current?.home}-${m.score?.current?.away}`;
                if (lastScoreState[m.id] && lastScoreState[m.id] !== currentScore) {
                    triggerGoalAlert(m, currentScore);
                }
                lastScoreState[m.id] = currentScore;
            }
        });
    }

    function saveScore(matchId) {
        const m = window.matchesData.find(match => match.id == matchId);
        if (!m) { alert("Matç tapılmadı."); return; }

        const hInput = document.getElementById(`h-${matchId}`);
        const aInput = document.getElementById(`a-${matchId}`);
        const h = parseInt(hInput.value);
        const a = parseInt(aInput.value);
        
        if (!isNaN(h) && !isNaN(a)) {
            let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
            let msgText = "";
            const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;
            const status = m.status ? m.status.toUpperCase() : '';

            if (status === 'FINISHED') {
                const realH = m.score.fullTime.home;
                const realA = m.score.fullTime.away;
                
                if (h === realH && a === realA) { pts += 4; msgText = `${matchName} (${realH}:${realA}) - Dəqiq hesab! 4 xal.`; } 
                else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) { pts += 2; msgText = `${matchName} (${realH}:${realA}) - Qol fərqi düzdür! 2 xal.`; } 
                else if (realH === realA && h === a) { pts += 1; msgText = `${matchName} (${realH}:${realA}) - Bərabərlik düzdür! 1 xal.`; } 
                else if ((realH > realA && h > a) || (realA > realH && a > h)) { pts += 1; msgText = `${matchName} (${realH}:${realA}) - Qalib düzdür! 1 xal.`; } 
                else { msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) düz çıxmadı.`; }
                localStorage.setItem('pts_' + currentUser, pts);
            } else {
                msgText = `${matchName}: Proqnozunuz (${h}:${a}) qeydə alındı, oyunun bitməsi gözlənilir.`;
            }

            localStorage.setItem('s-' + currentUser + '-' + matchId, `${h} - ${a}`);
            localStorage.setItem('msg_' + currentUser + '_' + matchId, JSON.stringify({ text: msgText, time: Date.now() }));
            
            fetchMatches(); 
        } else {
            alert("Zəhmət olmasa xanaları doldurun!");
        }
    }

    function updateNotifications() {
    let container = document.getElementById('notification-container');
    if (!container) return;
    
    let messages = [];
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            try { 
                messages.push(JSON.parse(localStorage.getItem(key))); 
            } catch (e) {}
        }
    }
    
    // Ən son bildiriş yuxarıda olsun
    messages.sort((a, b) => b.time - a.time);
    
    container.innerHTML = messages.map(msgData => {
        let dateStr = new Date(msgData.time).toLocaleString('az-AZ');
        let text = msgData.text;
        
        // Default (ilkin) olaraq mavi rəng təyin edirik
        let colorClass = "msg-loading"; 
        
        // Şərtləri dəqiq mətndəki açar sözlərə görə yoxlayırıq
        if (text.includes("4 xal")) {
            colorClass = "msg-4"; // Yaşıl
        } else if (text.includes("2 xal")) {
            colorClass = "msg-2"; // Sarı
        } else if (text.includes("1 xal")) {
            colorClass = "msg-1"; // Narıncı
        } else if (text.includes("çıxmadı") || text.includes("səhv")) {
            colorClass = "msg-0"; // Qırmızı
        } else if (text.includes("gözlənilir")) {
            colorClass = "msg-loading"; // Mavi
        }
        
        return `<div class="match-card ${colorClass}"><small style="color:#777">${dateStr}</small><br>${text}</div>`;
    }).join('') || "<p style='color:gray; padding:10px;'>Hələlik bildiriş yoxdur.</p>";
}

    function updatePointsTable() {
    // Cari istifadəçinin qrupunu al
    const myGroup = localStorage.getItem('group_' + currentUser);
    
    let users = [];
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        
        // Yalnız xalları yoxlayırıq
        if (key.startsWith('pts_')) {
            let uName = key.replace('pts_', '');
            let uGroup = localStorage.getItem('group_' + uName);
            
            // Əgər istifadəçi həmin qrupa aiddirsə siyahıya əlavə et
            if (uGroup === myGroup) {
                users.push({ name: uName, pts: parseInt(localStorage.getItem(key)) });
            }
        }
    }
    
    // Sıralama
    users.sort((a, b) => b.pts - a.pts);
    
    // Cədvəli göstər
    document.getElementById('table-body').innerHTML = users.map((u, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${u.name}</td>
            <td>${u.pts}</td>
        </tr>
    `).join('');
}


    function checkAndRefreshStatus() {
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            let matchId = key.split('_')[2]; 
            let data = JSON.parse(localStorage.getItem(key));

            if (data.text.includes("gözlənilir")) {
                let match = window.matchesData.find(m => m.id == matchId);
                // m.status yox, match.status olmalıdır
                if (match && match.status && match.status.toUpperCase() === 'FINISHED') {
                    localStorage.removeItem(key);
                    calculateAndNotify(match, matchId);
                }
            }
        }
    }
}

    function showMain(id, btn) {
